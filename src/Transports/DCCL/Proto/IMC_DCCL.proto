// Profile Sample
message ProfileSample {
    option (dccl.msg) = { codec_version: 4 max_bytes: 80};
    optional int32 depth = 1 [(dccl.field) = { min: 0 max: 2000 precision: 1 }];
    optional float avg = 2 [(dccl.field) = { min: -1000 max: 1000 precision: 2 }];
}


// StationKeeping Maneuver
message StationKeeping {
    option (dccl.msg) = { codec_version: 4 max_bytes: 80};
    optional float lat = 1 [(dccl.field) = { min: -1.570 max: 1.570 precision: 10 }];
    optional float lon = 2 [(dccl.field) = { min: -3.141592 max: 3.141592 precision: 6 }];
    optional float z = 3 [(dccl.field) = { min: -400 max: 400 precision: 1 }];
    ZUnits z_units = 4;  
    optional float radius = 5 [(dccl.field) = { min: 1 max: 100000 precision: 1 }];
    optional int32 duration = 6 [(dccl.field) = { min: 0 max: 65535}];
    optional float speed = 7 [(dccl.field) = { min: -2000 max: 2000 precision: 1 }];
    SpeedUnits speed_units = 8;
    //TODO: costum field > enum with possible string
}

// FollowPath Maneuver
message FollowPath {
    option (dccl.msg) = { codec_version: 4 max_bytes: 1000};
    optional int32 timeout = 1 [(dccl.field) = { min: 0 max: 65535}];
    optional float lat = 2 [(dccl.field) = { min: -1.570796 max: 1.570796 precision: 6 }];
    optional float lon = 3 [(dccl.field) = { min: -3.141592 max: 3.141592 precision: 6 }];
    optional float z = 4 [(dccl.field) = { min: -400 max: 400 precision: 1 }];
    ZUnits z_units = 5;
    optional float speed = 6 [(dccl.field) = { min: -2000 max: 2000 precision: 1 }];
    SpeedUnits speed_units = 7;
    repeated PathPoint points = 8 [(dccl.field) = { max_repeat: 30 }];
    //TODO: costum field > enum with possible string
}

// Goto Maneuver
message Goto {
    option (dccl.msg) = { codec_version: 4 max_bytes: 80};
    optional int32 timeout = 1 [(dccl.field) = { min: 0 max: 65535}];
    optional float lat = 2 [(dccl.field) = { min: -1.570796 max: 1.570796 precision: 6 }];
    optional float lon = 3 [(dccl.field) = { min: -3.141592 max: 3.141592 precision: 6 }];
    optional float z = 4 [(dccl.field) = { min: -400 max: 400 precision: 1 }];
    ZUnits z_units = 5;
    optional float speed = 6 [(dccl.field) = { min: -2000 max: 2000 precision: 1  }];
    SpeedUnits speed_units = 7;
    optional float roll = 8 [(dccl.field) = { min: -1 max: 6.283 precision: 3}];
    optional float pitch = 9 [(dccl.field) = { min: -1 max: 6.283 precision: 3 }];
    optional float yaw = 10 [(dccl.field) = { min: -1 max: 6.283 precision: 3 }];
}

// ParameterValue
message ParameterValue{   
    option (dccl.msg) = { codec_version: 4 max_bytes: 300};
    oneof ParameterValueUnion{
        float param_number = 1 [(dccl.field) = { min: -400 max: 10000 precision: 1 }];
        ParamValue param_enum = 2;
        string param_string = 3 [(dccl.field).max_length = 20];
    }
}

// ParameterName
message ParameterName{   
    option (dccl.msg) = { codec_version: 4 max_bytes: 300};
    oneof ParameterNameUnion{
        ParamName param_enum = 1;
        string param_string = 2 [(dccl.field).max_length = 50];
    }
}

// EntityName
message EntityName{   
    option (dccl.msg) = { codec_version: 4 max_bytes: 300};
    oneof EntityNameUnion{
        EntityNameEnum name_enum = 1;
        string name_string = 2 [(dccl.field).max_length = 50];
    }
}

// PathPoint 
message PathPoint {
    option (dccl.msg) = { codec_version: 4 max_bytes: 80};
    optional float x = 1 [(dccl.field) = { min: -2000  max: 2000  precision: 1  }];
    optional float y = 2 [(dccl.field) = { min: -2000  max: 2000  precision: 1  }];
    optional float z = 3 [(dccl.field) = { min: -400 max: 400  precision: 1 }];
}

// Maneuver - message group
message Maneuver{   
    option (dccl.msg) = { codec_version: 4 max_bytes: 300};
    oneof ManeuverUnion{
        Goto goto_maneuver = 1 ;
        FollowPath followpath_maneuver = 2;
        Loiter loiter_maneuver = 3;
        StationKeeping stationkeeping_maneuver = 4;
        //TODO: Insert here other maneuvers from Message-Group Maneuver
    }
}

// EntityParameter
message EntityParameter {
    option (dccl.msg) = { codec_version: 4 max_bytes: 300};
    ParameterName name = 1;
    ParameterValue value = 2;
}

// EntityParameters
message EntityParameters {
    option (dccl.msg) = { codec_version: 4 id: 802 max_bytes: 300};
    EntityName name = 1;
    repeated EntityParameter params = 2 [(dccl.field) = { max_repeat: 10 }];
}

//SetEntityParameters
message SetEntityParameters {
    option (dccl.msg) = { codec_version: 4 id: 804 max_bytes: 800};
    EntityName name = 1; 
    repeated EntityParameter params = 2 [(dccl.field) = { max_repeat: 10 }];
}

// ManeuverIDCombined (composed by maneuver_type and maneuver_number (max number in the maneuver name = 50))
message ManeuverIDCombined {
    option (dccl.msg) = { codec_version: 4 max_bytes: 30};
    ManeuverType maneuver_type = 1;
    int32 maneuver_number = 2 [(dccl.field) = { min: 0 max: 50}];
}

// ManeuverID (composed by maneuver_type and maneuver_number (max number in the maneuver name = 50))
message ManeuverID {
    option (dccl.msg) = { codec_version: 4 max_bytes: 30};
    oneof ManeuverIDUnion{
        ManeuverIDCombined id_combined = 1;
        string id_string = 2 [(dccl.field).max_length = 20];
    }
}

message TransitionCondition {
    option (dccl.msg) = { codec_version: 4 max_bytes: 30};
    oneof TransitionConditionUnion{
        TransitionConditionEnum condition_enum = 1;
        string condition_string = 2 [(dccl.field).max_length = 20];
    }
}

// Loiter Maneuver
message Loiter {
    option (dccl.msg) = { codec_version: 4 max_bytes: 1000};
    optional int32 timeout = 1 [(dccl.field) = { min: 0 max: 65535}];
    optional float lat = 2 [(dccl.field) = { min: -1.570796 max: 1.570796 precision: 6 }];
    optional float lon = 3 [(dccl.field) = { min: -3.141592 max: 3.141592 precision: 6 }];
    optional float z = 4 [(dccl.field) = { min: -400 max: 400 precision: 1 }];
    ZUnits z_units = 5;
    optional int32 duration = 6 [(dccl.field) = { min: 0 max: 10800}];
    float speed = 7 [(dccl.field) = { min: -2000 max: 2000 precision: 1 }];
    SpeedUnits speed_units = 8;
  
    enum LoiterTypeEnum {
        LT_DEFAULT = 0;
        LT_CIRCULAR = 1;
        LT_RACETRACK = 2;
        LT_EIGHT = 3;
        LT_HOVER = 4;
        LT_UNKNOWN = 5;
    }
    LoiterTypeEnum type = 9;
    optional float radius = 10 [(dccl.field) = { min: 1 max: 100000 precision: 1 }];
    optional float length = 11 [(dccl.field) = { min: 1 max: 100000 precision: 1 }];
    optional float bearing = 12 [(dccl.field) = { min: 0 max: 6.283 precision: 3 }];

    enum DirectionEnum
    {
        LD_VDEP = 0;
        LD_CLOCKW = 1;
        LD_CCLOCKW = 2;
        LD_IWINDCURR = 3;
        LD_UNKNOWN = 4;
    }

    DirectionEnum direction = 13;
}

message PlanManeuverStartActionsUnion {
    option (dccl.msg) = { codec_version: 4 max_bytes: 800000};
    oneof PlanManeuverStartActionsUnion_{
        SetEntityParameters ep = 1;
    }
}


// PlanManeuver 
message PlanManeuver {
    option (dccl.msg) = { codec_version: 4 max_bytes: 400};
    ManeuverID maneuver_id = 1;
    Maneuver data = 2;
    repeated PlanManeuverStartActionsUnion start_actions = 3 [(dccl.field) = { max_repeat: 15 }];
}


// PlanTransition 
message PlanTransition {
    option (dccl.msg) = { codec_version: 4 max_bytes: 400};
    ManeuverID source_man = 1;
    ManeuverID dest_man = 2;
    TransitionCondition conditions = 3;
}


// Vertical Profile
message VerticalProfile {
    option (dccl.msg) = { codec_version: 4 id: 111 max_bytes: 400};

    enum ParameterEnum
    {
        PROF_TEMPERATURE = 0;
        PROF_SALINITY = 1;
        PROF_CONDUCTIVITY = 2;
        PROF_PH = 3;
        PROF_REDOX = 4;
        PROF_CHLOROPHYLL = 5;
        PROF_TURBIDITY = 6;
        PROF_CURRENT_VELOCITY_N = 7;
        PROF_CURRENT_VELOCITY_E = 8;
        PROF_ABSOLUTE_WIND_AVG = 9;
        PROF_ABSOLUTE_WIND_MAX = 10;
        PROF_DISS_ORGANIC_MATTER = 11;
        PROF_DISS_OXYGEN = 12;
        PROF_UNKNOWN = 13;
    }

    ParameterEnum parameter = 1;
    optional int32 numsamples = 2 [(dccl.field) = { min: 0 max: 255 precision: 1 }];
    repeated ProfileSample samples = 3 [(dccl.field) = { max_repeat: 70 }];
    optional float lat = 4 [(dccl.field) = { min: -1.570796 max: 1.570796 precision: 6 }];
    optional float lon = 5 [(dccl.field) = { min: -3.141592 max: 3.141592 precision: 6 }];
}

// Estimated State
message EstimatedState {
