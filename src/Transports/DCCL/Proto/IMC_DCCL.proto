// Every time the /Proto/dcclMsg.proto file is modified                                  //
// turn on the DCCL flag while compiling in order to update the pb.cc and pb.h files     //
// (in dune/build: cmake -DDCCL=ON ../source)                                             //
///////////////////////////////////////////////////////////////////////////////////////////

syntax = "proto3";
package IMC_DCCL;
import "dccl/option_extensions.proto";

// Enum Z Units
enum ZUnits {
    Z_NONE = 0;
    Z_DEPTH = 1;
    Z_ALTITUDE = 2;
    Z_HEIGHT = 3;
    Z_UNKNOWN = 4;
}

// Enum Speed Units
enum SpeedUnits {
    SUNITS_METERS_PS = 0;
    SUNITS_RPM = 1;
    SUNITS_PERCENTAGE = 2;   
    SUNITS_UNKNOWN = 3;
}

// Enum Maneuver Type
enum ManeuverType {
    GOTO = 0;
    LOITER = 1;
    FOLLOWPATH = 2;
    STATIONKEEPING = 3;
    MT_UNKNOWN = 4;
}

enum ParamValue {
    TRUE = 0;
    FALSE = 1;
    BOTH = 2;  
    PV_UNKNOWN = 3;
}

enum TransitionConditionEnum {
    MANEUVERISDONE = 0;
    TC_UNKNOWN = 1;   
}

// Enum Entity Parameter Name
enum ParamName {
    ACTIVE = 0;
    ARDUPILOT_TRACKER = 1;
    BATHYMETRY_CHANNEL_AVAILABLE = 2;
    BOTTOM_TRACK_MINIMUM_DEPTH = 3;
    DATA_BITS = 4;
    FLIR_DUO_R = 5;
    FORMATION_FLIGHT = 6;
    FORMATION_POSITIONS = 7;
    FORMATION_REFERENCE_FRAME = 8;
    FREQUENCY = 9;
    HIGH_FREQUENCY_CHANNEL = 10;
    HIGH_FREQUENCY_CHANNELS = 11;
    HIGH_FREQUENCY_RANGE = 12;
    LOW_FREQUENCY_BATHYMETRY_CHANNEL = 13;
    LOW_FREQUENCY_CHANNEL = 14;
    LOW_FREQUENCY_CHANNELS = 15;
    LOW_FREQUENCY_RANGE = 16;
    ONBOARD_CAMERA = 17;
    OPTIMIZE_FOR_THIS_SPEED = 18;
    PERIODICITY_OF_DATA_SAMPLING = 19;
    PROFILE_MODE = 20;
    RANGE = 21;
    RANGE_MULTIPLIER = 22;
    SAMPLE_TIME_DURATION = 23;
    SCALE_FACTOR = 24;
    SECTOR_WIDTH = 25;
    SHUTTER_VALUE_MS = 26;
    STEP_SIZE = 27;
    STROBE_DELAY_US = 28;
    THRUSTER_ALWAYS_ON = 29;
    TRANSITION_TO_FW = 30;
    TRANSITION_TO_MC = 31;
    USE_CONTROLLER = 32;
    VEHICLE_LIST = 33;
    PN_UNKNOWN = 34;
}


//Enum EntityNameEnum 
enum EntityNameEnum {
    ACOUSTIC_MODEM = 0;
    ADCP = 1;
    AUTOPILOT = 2;
    CAMERA = 3;
    CTD = 4;
    DISSOLVED_OXYGEN = 5;
    FLUOROMETERS = 6;
    FORMATION_COORDINATOR = 7;
    HEADING_CONTROLLER = 8;
    HEIGHT_CONTROL = 9;
    LBL = 10;
    MOTOR_CONTROLLER_CHANNEL_0 = 11;
    MOTOR_CONTROLLER_CHANNEL_1 = 12;
    MULTIBEAM = 13;
    PATH_CONTROL = 14;
    PATH_CONTROL_LEADER = 15;
    PENCIL_BEAM = 16;
    PHOTO_TRIGGER = 17;
    RANGER = 18;
    REMOTE_CONTROL = 19;
    REMOTE_OPERATION = 20;
    SIDESCAN = 21;
    SLAVE_CPU = 22;
    UAVCAMERA = 23;
    EN_UNKNOWN = 24;
}

// Profile Sample
message ProfileSample {
    option (dccl.msg) = { codec_version: 4 max_bytes: 80};
    optional int32 depth = 1 [(dccl.field) = { min: 0 max: 2000 precision: 1 }];
    optional float avg = 2 [(dccl.field) = { min: -1000 max: 1000 precision: 2 }];
}


// StationKeeping Maneuver
message StationKeeping {
    option (dccl.msg) = { codec_version: 4 max_bytes: 80};
    optional float lat = 1 [(dccl.field) = { min: -1.570 max: 1.570 precision: 10 }];
    optional float lon = 2 [(dccl.field) = { min: -3.141592 max: 3.141592 precision: 6 }];
    optional float z = 3 [(dccl.field) = { min: -400 max: 400 precision: 1 }];
    ZUnits z_units = 4;  
    optional float radius = 5 [(dccl.field) = { min: 1 max: 100000 precision: 1 }];
    optional int32 duration = 6 [(dccl.field) = { min: 0 max: 65535}];
    optional float speed = 7 [(dccl.field) = { min: -2000 max: 2000 precision: 1 }];
    SpeedUnits speed_units = 8;
    //TODO: costum field > enum with possible string
}

// FollowPath Maneuver
message FollowPath {
    option (dccl.msg) = { codec_version: 4 max_bytes: 1000};
    optional int32 timeout = 1 [(dccl.field) = { min: 0 max: 65535}];
    optional float lat = 2 [(dccl.field) = { min: -1.570796 max: 1.570796 precision: 6 }];
    optional float lon = 3 [(dccl.field) = { min: -3.141592 max: 3.141592 precision: 6 }];
    optional float z = 4 [(dccl.field) = { min: -400 max: 400 precision: 1 }];
    ZUnits z_units = 5;
    optional float speed = 6 [(dccl.field) = { min: -2000 max: 2000 precision: 1 }];
    SpeedUnits speed_units = 7;
    repeated PathPoint points = 8 [(dccl.field) = { max_repeat: 30 }];
    //TODO: costum field > enum with possible string
}

// Goto Maneuver
message Goto {
    option (dccl.msg) = { codec_version: 4 max_bytes: 80};
    optional int32 timeout = 1 [(dccl.field) = { min: 0 max: 65535}];
    optional float lat = 2 [(dccl.field) = { min: -1.570796 max: 1.570796 precision: 6 }];
    optional float lon = 3 [(dccl.field) = { min: -3.141592 max: 3.141592 precision: 6 }];
    optional float z = 4 [(dccl.field) = { min: -400 max: 400 precision: 1 }];
    ZUnits z_units = 5;
    optional float speed = 6 [(dccl.field) = { min: -2000 max: 2000 precision: 1  }];
    SpeedUnits speed_units = 7;
    optional float roll = 8 [(dccl.field) = { min: -1 max: 6.283 precision: 3}];
    optional float pitch = 9 [(dccl.field) = { min: -1 max: 6.283 precision: 3 }];
    optional float yaw = 10 [(dccl.field) = { min: -1 max: 6.283 precision: 3 }];
}

// ParameterValue
message ParameterValue{   
    option (dccl.msg) = { codec_version: 4 max_bytes: 300};
    oneof ParameterValueUnion{
        float param_number = 1 [(dccl.field) = { min: -400 max: 10000 precision: 1 }];
        ParamValue param_enum = 2;
        string param_string = 3 [(dccl.field).max_length = 20];
    }
}

// ParameterName
message ParameterName{   
    option (dccl.msg) = { codec_version: 4 max_bytes: 300};
    oneof ParameterNameUnion{
        ParamName param_enum = 1;
        string param_string = 2 [(dccl.field).max_length = 50];
    }
}

// EntityName
message EntityName{   
    option (dccl.msg) = { codec_version: 4 max_bytes: 300};
    oneof EntityNameUnion{
        EntityNameEnum name_enum = 1;
        string name_string = 2 [(dccl.field).max_length = 50];
    }
}

// PathPoint 
message PathPoint {
    option (dccl.msg) = { codec_version: 4 max_bytes: 80};
    optional float x = 1 [(dccl.field) = { min: -2000  max: 2000  precision: 1  }];
    optional float y = 2 [(dccl.field) = { min: -2000  max: 2000  precision: 1  }];
    optional float z = 3 [(dccl.field) = { min: -400 max: 400  precision: 1 }];
}

// Maneuver - message group
message Maneuver{   
    option (dccl.msg) = { codec_version: 4 max_bytes: 300};
    oneof ManeuverUnion{
        Goto goto_maneuver = 1 ;
        FollowPath followpath_maneuver = 2;
        Loiter loiter_maneuver = 3;
        StationKeeping stationkeeping_maneuver = 4;
        //TODO: Insert here other maneuvers from Message-Group Maneuver
    }
}

// EntityParameter
message EntityParameter {
    option (dccl.msg) = { codec_version: 4 max_bytes: 300};
    ParameterName name = 1;
    ParameterValue value = 2;
}

//SetEntityParameters
message SetEntityParameters {
    option (dccl.msg) = { codec_version: 4 id: 804 max_bytes: 800};
    EntityName name = 1; 
    repeated EntityParameter params = 2 [(dccl.field) = { max_repeat: 10 }];
}

// ManeuverIDCombined (composed by maneuver_type and maneuver_number (max number in the maneuver name = 50))
message ManeuverIDCombined {
    option (dccl.msg) = { codec_version: 4 max_bytes: 30};
    ManeuverType maneuver_type = 1;
    int32 maneuver_number = 2 [(dccl.field) = { min: 0 max: 50}];
}

// ManeuverID (composed by maneuver_type and maneuver_number (max number in the maneuver name = 50))
message ManeuverID {
    option (dccl.msg) = { codec_version: 4 max_bytes: 30};
    oneof ManeuverIDUnion{
        ManeuverIDCombined id_combined = 1;
        string id_string = 2 [(dccl.field).max_length = 20];
    }
}

message TransitionCondition {
    option (dccl.msg) = { codec_version: 4 max_bytes: 30};
    oneof TransitionConditionUnion{
        TransitionConditionEnum condition_enum = 1;
        string condition_string = 2 [(dccl.field).max_length = 20];
    }
}

// Loiter Maneuver
message Loiter {
    option (dccl.msg) = { codec_version: 4 max_bytes: 1000};
    optional int32 timeout = 1 [(dccl.field) = { min: 0 max: 65535}];
    optional float lat = 2 [(dccl.field) = { min: -1.570796 max: 1.570796 precision: 6 }];
    optional float lon = 3 [(dccl.field) = { min: -3.141592 max: 3.141592 precision: 6 }];
    optional float z = 4 [(dccl.field) = { min: -400 max: 400 precision: 1 }];
    ZUnits z_units = 5;
    optional int32 duration = 6 [(dccl.field) = { min: 0 max: 10800}];
    float speed = 7 [(dccl.field) = { min: -2000 max: 2000 precision: 1 }];
    SpeedUnits speed_units = 8;
  
    enum LoiterTypeEnum {
        LT_DEFAULT = 0;
        LT_CIRCULAR = 1;
        LT_RACETRACK = 2;
        LT_EIGHT = 3;
        LT_HOVER = 4;
        LT_UNKNOWN = 5;
    }
    LoiterTypeEnum type = 9;
    optional float radius = 10 [(dccl.field) = { min: 1 max: 100000 precision: 1 }];
    optional float length = 11 [(dccl.field) = { min: 1 max: 100000 precision: 1 }];
    optional float bearing = 12 [(dccl.field) = { min: 0 max: 6.283 precision: 3 }];

    enum DirectionEnum
    {
        LD_VDEP = 0;
        LD_CLOCKW = 1;
        LD_CCLOCKW = 2;
        LD_IWINDCURR = 3;
        LD_UNKNOWN = 4;
    }

    DirectionEnum direction = 13;
}

message PlanManeuverStartActionsUnion {
    option (dccl.msg) = { codec_version: 4 max_bytes: 800000};
    oneof PlanManeuverStartActionsUnion_{
        SetEntityParameters ep = 1;
    }
}


// PlanManeuver 
message PlanManeuver {
    option (dccl.msg) = { codec_version: 4 max_bytes: 400};
    ManeuverID maneuver_id = 1;
    Maneuver data = 2;
    repeated PlanManeuverStartActionsUnion start_actions = 3 [(dccl.field) = { max_repeat: 15 }];
}


// PlanTransition 
message PlanTransition {
    option (dccl.msg) = { codec_version: 4 max_bytes: 400};
    ManeuverID source_man = 1;
    ManeuverID dest_man = 2;
    TransitionCondition conditions = 3;
}


// Vertical Profile
message VerticalProfile {
    option (dccl.msg) = { codec_version: 4 id: 111 max_bytes: 80};

    enum ParameterEnum
    {
        PROF_TEMPERATURE = 0;
        PROF_SALINITY = 1;
        PROF_CONDUCTIVITY = 2;
        PROF_PH = 3;
        PROF_REDOX = 4;
        PROF_CHLOROPHYLL = 5;
        PROF_TURBIDITY = 6;
        PROF_UNKNOWN = 7;
    }

    ParameterEnum parameter = 1;
    optional int32 numsamples = 2 [(dccl.field) = { min: 0 max: 255 precision: 1 }];
    repeated ProfileSample samples = 3 [(dccl.field) = { max_repeat: 70 }];
    optional float lat = 4 [(dccl.field) = { min: -1.570796 max: 1.570796 precision: 6 }];
    optional float lon = 5 [(dccl.field) = { min: -3.141592 max: 3.141592 precision: 6 }];
}

// Estimated State
message EstimatedState {
    option (dccl.msg) = { codec_version: 4 id: 350 max_bytes: 80};
    optional float lat = 1 [(dccl.field) = { min: -1.570796 max: 1.570796 precision: 6 }];
    optional float lon = 2 [(dccl.field) = { min: -3.141592 max: 3.141592 precision: 6 }];
    optional float height = 3 [(dccl.field) = { min: -1000 max: 7000  precision: 1 }];
    optional float x = 4 [(dccl.field) = { min: -2000  max: 2000  precision: 1  }];
    optional float y = 5 [(dccl.field) = { min: -2000 max: 2000  precision: 1 }];
    optional float z = 6 [(dccl.field) = { min: -400 max: 400  precision: 1 }];
    optional float phi = 7 [(dccl.field) = { min: -3.141 max: 3.141 precision: 3 }];
    optional float theta = 8 [(dccl.field) = { min: -1.570 max: 1.570 precision: 3 }];
    optional float psi = 9 [(dccl.field) = { min: -3.141 max: 3.141 precision: 3 }];
    optional float u = 10 [(dccl.field) = { min: -10 max: 10 precision: 1 }];
    optional float v = 11 [(dccl.field) = { min: -10 max: 10 precision: 1 }];
    optional float w = 12 [(dccl.field) = { min: -10 max: 10 precision: 1 }];
    optional float vx = 13 [(dccl.field) = { min: -10 max: 10 precision: 1 }];
    optional float vy = 14 [(dccl.field) = { min: -10 max: 10 precision: 1 }];
    optional float vz = 15 [(dccl.field) = { min: -10 max: 10 precision: 1 }];
    optional float p = 16 [(dccl.field) = { min: -3.141 max: 3.141 precision: 3 }]; 
    optional float q = 17 [(dccl.field) = { min: -3.141 max: 3.141 precision: 3 }]; 
    optional float r = 18 [(dccl.field) = { min: -3.141 max: 3.141 precision: 3 }]; 
    optional float depth = 19 [(dccl.field) = { min: -1 max: 400 precision: 2 }];
    optional float alt = 20 [(dccl.field) = { min: -1 max: 5000 precision: 2 }];
}


// PlanSpecification 
message PlanSpecification {
    option (dccl.msg) = { codec_version: 4 id: 551 max_bytes: 800000};
    optional string plan_id = 1 [(dccl.field).max_length = 20]; 
    optional string description = 2 [(dccl.field).max_length = 2]; 
    optional string vnamespace = 3 [(dccl.field).max_length = 2]; 
    ManeuverID start_man_id = 4;
    repeated PlanManeuver maneuvers = 5 [(dccl.field) = { max_repeat: 30 }];
    repeated PlanTransition transitions = 6 [(dccl.field) = { max_repeat: 30 }];
    repeated PlanSpecificationStartActionsUnion start_actions = 7 [(dccl.field) = { max_repeat: 7 }];
    repeated PlanSpecificationEndActionsUnion end_actions = 8 [(dccl.field) = { max_repeat: 7 }];
}


// PlanDB 
message PlanDB {
    option (dccl.msg) = { codec_version: 4 id: 556 max_bytes: 800000};

    enum TypeEnum
    {
        DBT_REQUEST = 0;
        DBT_SUCCESS = 1;
        DBT_FAILURE = 2;
        DBT_IN_PROGRESS = 3;
        DBT_UNKNOWN = 4;
    }

    enum OperationEnum
    {
        DBOP_SET = 0;
        DBOP_DEL = 1;
        DBOP_GET = 2;
        DBOP_GET_INFO = 3;
        DBOP_CLEAR = 4;
        DBOP_GET_STATE = 5;
        DBOP_GET_DSTATE = 6;
        DBOP_BOOT = 7;
        DBOP_UNKNOWN = 8;
    }
    
    TypeEnum type = 1;
    OperationEnum op = 2;
    optional int32 request_id = 3 [(dccl.field) = { min: 0 max: 10000 precision: 1 }];
    optional string plan_id = 4 [(dccl.field).max_length = 20]; 
    PlanDBArgUnion arg = 5;
    optional string info = 6 [(dccl.field).max_length = 40]; 
}

// PlanDBState 
message PlanDBState {
    option (dccl.msg) = { codec_version: 4 id: 557 max_bytes: 800000};
    optional int32 plan_count = 1 [(dccl.field) = { min: 0 max: 100000 precision: 1 }];
    optional int32 plan_size = 2 [(dccl.field) = { min: 0 max: 1 precision: 1 }];
    optional float change_time = 3 [(dccl.field) = { min: 0 max: 1835634114 precision: 2 }];
    optional int32 change_sid = 4 [(dccl.field) = { min: 0 max: 50000 precision: 1 }];
    optional string change_sname = 5 [(dccl.field).max_length = 40]; 
    optional string md5 = 6 [(dccl.field).max_length = 40]; 
    repeated PlanDBInformation plans_info = 7 [(dccl.field) = { max_repeat: 100 }];
}


// PlanDBInformation 
message PlanDBInformation {
    option (dccl.msg) = { codec_version: 4 id: 558 max_bytes: 800000};
    optional string plan_id = 1 [(dccl.field).max_length = 20]; 
    optional int32 plan_size = 2 [(dccl.field) = { min: 0 max: 5000 precision: 1 }];
    optional float change_time = 3 [(dccl.field) = { min: 0 max: 1835634114 precision: 2 }];
    optional int32 change_sid = 4 [(dccl.field) = { min: 0 max: 50000 precision: 1 }];
    optional string change_sname = 5 [(dccl.field).max_length = 40]; 
    optional string md5 = 6 [(dccl.field).max_length = 40]; 
}

//PlanControl
message PlanControl {
    option (dccl.msg) = { codec_version: 4 id: 559 max_bytes: 800000};
    enum TypeEnum
    {
        PC_REQUEST = 0;
        PC_SUCCESS = 1;
        PC_FAILURE = 2;
        PC_IN_PROGRESS = 3;
        PCTE_UNKNOWN = 4;
    }   
  
    enum OperationEnum
    {
        PC_START = 0;
        PC_STOP = 1;
        PC_LOAD = 2;
        PC_GET = 3;
        PCOE_UNKNOWN = 4;
    }  

    TypeEnum type = 1;  
    OperationEnum op = 2; 
    optional int32 request_id = 3 [(dccl.field) = { min: 0 max: 5000 precision: 1 }];
    optional string plan_id = 4 [(dccl.field).max_length = 100];
    optional int32 flags = 5 [(dccl.field) = { min: 0 max: 5000 precision: 1 }];
    PlanControlArgUnion arg = 6;
    optional string info = 7 [(dccl.field).max_length = 100];
}

//PlanStatistics
message PlanStatistics {
    option (dccl.msg) = { codec_version: 4 id: 564 max_bytes: 800000};
    optional string plan_id = 1 [(dccl.field).max_length = 20];
    enum TypeEnum
    {
        TP_PREPLAN = 0;
        TP_INPLAN = 1;
        TP_POSTPLAN = 2;
        TP_UNKNOWN = 3;
    }  
    TypeEnum type = 2;  
    optional int32 properties = 3 [(dccl.field) = { min: 0 max: 5000 precision: 1 }];
    optional string durations = 4 [(dccl.field).max_length = 100];
    optional string distances = 5 [(dccl.field).max_length = 100];
    optional string actions = 6 [(dccl.field).max_length = 100];
    optional string fuel = 7 [(dccl.field).max_length = 100];
}

//VehicleState
message VehicleState {
    option (dccl.msg) = { codec_version: 4 id: 500 max_bytes: 800000};
    enum OperationModeEnum
    {
        VS_SERVICE = 0;
        VS_CALIBRATION = 1;
        VS_ERROR= 2;
        VS_MANEUVER = 3;
        VS_EXTERNAL = 4;
        VS_BOOT = 5;
        VS_UNKNOWN = 6;
    }  
    OperationModeEnum op_mode = 1;  
    optional int32 error_count = 2 [(dccl.field) = { min: 0 max: 255 precision: 1 }];
    optional string error_ents = 3 [(dccl.field).max_length = 500];
    optional int32 maneuver_type = 4 [(dccl.field) = { min: 0 max: 65535 precision: 1 }];
    optional float maneuver_stime = 5 [(dccl.field) = { min: -1 max: 1808764799 precision: 1 }];
    optional int32 maneuver_eta = 6 [(dccl.field) = { min: 0 max: 86400 precision: 1 }];
    optional int32 control_loops = 7 [(dccl.field) = { min: 0 max: 10000 precision: 1 }];
    optional int32 flags = 8 [(dccl.field) = { min: 0 max: 10000 precision: 1 }];
    optional string last_error = 9 [(dccl.field).max_length = 100];
    optional float last_error_time = 10 [(dccl.field) = { min: -1 max: 1835634114 precision: 2 }];
}

//EntityState
message EntityState {
    option (dccl.msg) = { codec_version: 4 id: 1 max_bytes: 800000};
    enum StateEnum
    {
        ESTA_BOOT = 0;
        ESTA_NORMAL = 1;
        ESTA_FAULT= 2;
        ESTA_ERROR = 3;
        ESTA_FAILURE = 4;
        ESTA_UNKNOWN = 5;
    }  
    StateEnum state = 1;  
    optional int32 flags = 2 [(dccl.field) = { min: 0 max: 255 precision: 1 }];
    optional string description = 3 [(dccl.field).max_length = 500];
}

//PlanControlState
message PlanControlState {
    option (dccl.msg) = { codec_version: 4 id: 560 max_bytes: 800000};
    enum StateEnum
    {
        PCS_BLOCKED = 0;
        PCS_READY = 1;
        PCS_INITIALIZING = 2;
        PCS_EXECUTING = 3;
        PCS_UNKNOWN = 4;
    }  
    StateEnum state = 1;  
    optional string plan_id = 2 [(dccl.field).max_length = 500];
    optional int32 plan_eta = 3 [(dccl.field) = { min: -1 max: 172800 precision: 1 }];
    optional float plan_progress = 4 [(dccl.field) = { min: -100 max: 100 precision: 2 }];
    ManeuverID man_id = 5;
    optional int32 man_type = 6 [(dccl.field) = { min: 0 max: 50000 precision: 1 }];
    optional int32 man_eta = 7 [(dccl.field) = { min: -1 max: 172800 precision: 1 }];
    enum LastPlanOutcomeEnum
    {
        LPO_NONE = 0;
        LPO_SUCCESS = 1;
        LPO_FAILURE = 2;
        LPO_UNKNOWN = 3;
    }  
    LastPlanOutcomeEnum last_outcome = 8; 
}

message PlanDBArgUnion {
    option (dccl.msg) = { codec_version: 4 max_bytes: 800000};
    oneof PlanDBArgUnion_{
        PlanSpecification ps_arg = 1;
        PlanDBInformation pi_arg = 2;
        PlanDBState pc_arg = 3;
    }
}

message PlanSpecificationStartActionsUnion {
    option (dccl.msg) = { codec_version: 4 max_bytes: 800000};
    oneof PlanSpecificationStartActionsUnion_{
        SetEntityParameters ep = 1;
    }
}

message PlanSpecificationEndActionsUnion {
    option (dccl.msg) = { codec_version: 4 max_bytes: 800000};
    oneof PlanSpecificationEndActionsUnion_{
        SetEntityParameters ep = 1;
    }
}

message PlanControlArgUnion {
    option (dccl.msg) = { codec_version: 4 max_bytes: 800000};
    oneof PlanDBArgUnion_{
        PlanSpecification ps_arg = 1;
        Maneuver man_arg = 2;
        PlanStatistics stat_arg = 3;
    }
}