// Profile Sample
message ProfileSample {
    option (dccl.msg) = { codec_version: 4 };
    optional uint32 depth = 1 [(dccl.field) = { min: 0 max: 4000}];
    optional float avg = 2 [(dccl.field) = { min: -10000 max: 10000 precision: 2 }];
}


// StationKeeping Maneuver
message StationKeeping {
    option (dccl.msg) = { codec_version: 4 };
    optional float lat = 1 [(dccl.field) = { min: -1.5707963 max: 1.5707963 precision: 7 }];
    optional float lon = 2 [(dccl.field) = { min: -3.1415926 max: 3.1415926 precision: 7 }];
    optional float z = 3 [(dccl.field) = { min: 0 max: 400 precision: 1 }];
    ZUnits z_units = 4;  
    optional float radius = 5 [(dccl.field) = { min: 0 max: 100 precision: 1 }];
    optional uint32 duration = 6 [(dccl.field) = { min: 0 max: 21600}];
    optional float speed = 7 [(dccl.field) = { min: -4000 max: 4000 precision: 1 }];
    SpeedUnits speed_units = 8;
    optional string custom = 9 [(dccl.field).max_length = 10]; 
}

// FollowPath Maneuver
message FollowPath {
    option (dccl.msg) = { codec_version: 4 };
    optional uint32 timeout = 1 [(dccl.field) = { min: 0 max: 10000}];
    optional float lat = 2 [(dccl.field) = { min: -1.5707963 max: 1.5707963 precision: 7 }];
    optional float lon = 3 [(dccl.field) = { min: -3.1415926 max: 3.1415926 precision: 7 }];
    optional float z = 4 [(dccl.field) = { min: 0 max: 400 precision: 1 }];
    ZUnits z_units = 5;
    optional float speed = 6 [(dccl.field) = { min: -4000 max: 4000 precision: 1 }];
    SpeedUnits speed_units = 7;
    repeated PathPoint points = 8 [(dccl.field) = { max_repeat: 10 }];
    optional string custom = 9 [(dccl.field).max_length = 10];
}

// Goto Maneuver
message Goto {
    option (dccl.msg) = { codec_version: 4 };
    optional uint32 timeout = 1 [(dccl.field) = { min: 0 max: 10000}];
    optional float lat = 2 [(dccl.field) = { min: -1.5707963 max: 1.5707963 precision: 7 }];
    optional float lon = 3 [(dccl.field) = { min: -3.1415926 max: 3.1415926 precision: 7 }];
    optional float z = 4 [(dccl.field) = { min: 0 max: 400 precision: 1 }];
    ZUnits z_units = 5;
    optional float speed = 6 [(dccl.field) = { min: -4000 max: 4000 precision: 1 }];
    SpeedUnits speed_units = 7;
    optional float roll = 8 [(dccl.field) = { min: -1 max: 6.283 precision: 2}];
    optional float pitch = 9 [(dccl.field) = { min: -1 max: 6.283 precision: 2 }];
    optional float yaw = 10 [(dccl.field) = { min: -1 max: 6.283 precision: 2 }];
    optional string custom = 11 [(dccl.field).max_length = 10];
}

// ParameterValue
message ParameterValue{   
    option (dccl.msg) = { codec_version: 4 };
    oneof ParameterValueUnion{
        float param_number = 1 [(dccl.field) = { min: -100000 max: 100000 precision: 1 }];
        ParamValue param_enum = 2;
        string param_string = 3 [(dccl.field).max_length = 20];
    }
}

// ParameterName
message ParameterName{   
    option (dccl.msg) = { codec_version: 4 };
    oneof ParameterNameUnion{
        ParamName param_enum = 1;
        string param_string = 2 [(dccl.field).max_length = 50];
    }
}

// EntityName
message EntityName{   
    option (dccl.msg) = { codec_version: 4 };
    oneof EntityNameUnion{
        EntityNameEnum name_enum = 1;
        string name_string = 2 [(dccl.field).max_length = 50];
    }
}

// PathPoint 
message PathPoint {
    option (dccl.msg) = { codec_version: 4 };
    optional float x = 1 [(dccl.field) = { min: -20000  max: 20000  precision: 1  }];
    optional float y = 2 [(dccl.field) = { min: -20000  max: 20000  precision: 1  }];
    optional float z = 3 [(dccl.field) = { min: 0 max: 400  precision: 1 }];
}

// Maneuver - message group
message Maneuver{   
    option (dccl.msg) = { codec_version: 4 };
    oneof ManeuverUnion{
        Goto goto_maneuver = 1 ;
        FollowPath followpath_maneuver = 2;
        Loiter loiter_maneuver = 3;
        StationKeeping stationkeeping_maneuver = 4;
        //TODO: Insert here other maneuvers from Message-Group Maneuver
    }
}

// EntityParameter 
message EntityParameter {
    option (dccl.msg) = { codec_version: 4};
    ParameterName name = 1;
    ParameterValue value = 2;
}

// EntityParameters
message EntityParameters {
    option (dccl.msg) = { codec_version: 4 id: 802};
    EntityName name = 1;
    repeated EntityParameter params = 2 [(dccl.field) = { max_repeat: 30 }];
}

//SetEntityParameters
message SetEntityParameters {
    option (dccl.msg) = { codec_version: 4 id: 804};
    EntityName name = 1; 
    repeated EntityParameter params = 2 [(dccl.field) = { max_repeat: 30 }];
}

message ItemList {
    option (dccl.msg) = { codec_version: 4};
    EntityName name = 1;
    int32 number = 2 [(dccl.field) = { min: 0 max: 200}];
}

message ListCombined {
    option (dccl.msg) = { codec_version: 4};
    repeated ItemList item = 1 [(dccl.field) = { max_repeat: 200}];
}

// FuelItemList
message FuelItemList {
    option (dccl.msg) = { codec_version: 4};
    FuelParcelName name = 1;
    float number = 2 [(dccl.field) = { min: 0 max: 100 precision:2}];
}

// FuelList
message FuelList {
    option (dccl.msg) = { codec_version: 4};
    repeated FuelItemList item = 1 [(dccl.field) = { max_repeat: 7}];
}

message DurationName {
    option (dccl.msg) = { codec_version: 4};
    DurationEnum name = 1;
    optional ManeuverID maneuver_id = 2;
}

// DurationItemList
message DurationItemList {
    option (dccl.msg) = { codec_version: 4};
    DurationName name = 1;
    float number = 2 [(dccl.field) = { min: 0 max: 172800 precision:1}];
}

// DurationList
message DurationList {
    option (dccl.msg) = { codec_version: 4};
    repeated DurationItemList item = 1 [(dccl.field) = { max_repeat: 20}];
}

// EntityList
message EntityList {
    option (dccl.msg) = { codec_version: 4 id: 5};
    enum operationEnum {
        OP_REPORT = 0;
        OP_QUERY = 1;
        OP_RELOAD = 2;
        OP_UNKNOWN = 3;
    }
    operationEnum op = 1;
    ListCombined list = 2;
}

// ManeuverIDCombined (composed by maneuver_type and maneuver_number (max number in the maneuver name = 20))
message ManeuverIDCombined {
    option (dccl.msg) = { codec_version: 4};
    ManeuverType maneuver_type = 1;
    int32 maneuver_number = 2 [(dccl.field) = { min: 0 max: 20}];
}

// ManeuverID 
message ManeuverID {
    option (dccl.msg) = { codec_version: 4};
    oneof ManeuverIDUnion{
        ManeuverIDCombined id_combined = 1;
        string id_string = 2 [(dccl.field).max_length = 10];
    }
}

message TransitionCondition {
    option (dccl.msg) = { codec_version: 4};
    oneof TransitionConditionUnion{
        TransitionConditionEnum condition_enum = 1;
        string condition_string = 2 [(dccl.field).max_length = 20];
    }
}

// Loiter Maneuver 
message Loiter {
    option (dccl.msg) = { codec_version: 4 };
    optional uint32 timeout = 1 [(dccl.field) = { min: 0 max: 10000}];
    optional float lat = 2 [(dccl.field) = { min: -1.5707963 max: 1.5707963 precision: 7 }];
    optional float lon = 3 [(dccl.field) = { min: -3.1415926 max: 3.1415926 precision: 7 }];
    optional float z = 4 [(dccl.field) = { min: 0 max: 400 precision: 1 }];
    ZUnits z_units = 5;
    optional uint32 duration = 6 [(dccl.field) = { min: 0 max: 21600}];
    optional float speed = 7 [(dccl.field) = { min: -4000 max: 4000 precision: 1 }];
    SpeedUnits speed_units = 8;
  
    enum LoiterTypeEnum {
        LT_DEFAULT = 0;
        LT_CIRCULAR = 1;
        LT_RACETRACK = 2;
        LT_EIGHT = 3;
        LT_HOVER = 4;
        LT_UNKNOWN = 5;
    }
    LoiterTypeEnum type = 9;
    optional float radius = 10 [(dccl.field) = { min: 1 max: 256 precision: 1 }];
    optional float length = 11 [(dccl.field) = { min: 1 max: 256 precision: 1 }];
    optional float bearing = 12 [(dccl.field) = { min: 0 max: 6.283 precision: 3 }];

    enum DirectionEnum
    {
        LD_VDEP = 0;
        LD_CLOCKW = 1;
        LD_CCLOCKW = 2;
        LD_IWINDCURR = 3;
        LD_UNKNOWN = 4;
    }

    DirectionEnum direction = 13;
    optional string custom = 14 [(dccl.field).max_length = 10];
}

message PlanManeuverStartActionsUnion {
    option (dccl.msg) = { codec_version: 4};
    oneof PlanManeuverStartActionsUnion_{
        SetEntityParameters ep = 1;
    }
}


// PlanManeuver 
message PlanManeuver {
    option (dccl.msg) = { codec_version: 4};
    ManeuverID maneuver_id = 1;
    Maneuver data = 2;
    repeated PlanManeuverStartActionsUnion start_actions = 3 [(dccl.field) = { max_repeat: 15 }];
}


// PlanTransition 
message PlanTransition {
    option (dccl.msg) = { codec_version: 4};
    ManeuverID source_man = 1;
    ManeuverID dest_man = 2;
    TransitionCondition conditions = 3;
}


// Vertical Profile
message VerticalProfile {
    option (dccl.msg) = { codec_version: 4 id: 111};

    enum ParameterEnum
    {
        PROF_TEMPERATURE = 0;
        PROF_SALINITY = 1;
        PROF_CONDUCTIVITY = 2;
        PROF_PH = 3;
        PROF_REDOX = 4;
        PROF_CHLOROPHYLL = 5;
        PROF_TURBIDITY = 6;
        PROF_CURRENT_VELOCITY_N = 7;
        PROF_CURRENT_VELOCITY_E = 8;
        PROF_ABSOLUTE_WIND_AVG = 9;
        PROF_ABSOLUTE_WIND_MAX = 10;
        PROF_DISS_ORGANIC_MATTER = 11;
        PROF_DISS_OXYGEN = 12;
        PROF_UNKNOWN = 13;
    }

    ParameterEnum parameter = 1;
    optional uint32 numsamples = 2 [(dccl.field) = { min: 0 max: 255}];
    repeated ProfileSample samples = 3 [(dccl.field) = { max_repeat: 70 }];
    optional float lat = 4 [(dccl.field) = { min: -1.5707963 max: 1.5707963 precision: 7 }];
    optional float lon = 5 [(dccl.field) = { min: -3.1415926 max: 3.1415926 precision: 7 }];
}

// Estimated State
message EstimatedState {
    option (dccl.msg) = { codec_version: 4 id: 350};
    optional float lat = 1 [(dccl.field) = { min: -1.5707963 max: 1.5707963 precision: 7 }];
    optional float lon = 2 [(dccl.field) = { min: -3.1415926 max: 3.1415926 precision: 7 }];
    optional float height = 3 [(dccl.field) = { min: -10 max: 10  precision: 1 }];
    optional float x = 4 [(dccl.field) = { min: -20000  max: 20000  precision: 1  }];
    optional float y = 5 [(dccl.field) = { min: -20000 max: 20000  precision: 1 }];
    optional float z = 6 [(dccl.field) = { min: -10 max: 10  precision: 1 }];
    optional float phi = 7 [(dccl.field) = { min: -3.141 max: 3.141 precision: 2 }];
    optional float theta = 8 [(dccl.field) = { min: -1.570 max: 1.570 precision: 2 }];
    optional float psi = 9 [(dccl.field) = { min: -3.141 max: 3.141 precision: 2 }];
    optional float u = 10 [(dccl.field) = { min: -10 max: 10 precision: 1 }];
    optional float v = 11 [(dccl.field) = { min: -10 max: 10 precision: 1 }];
    optional float w = 12 [(dccl.field) = { min: -10 max: 10 precision: 1 }];
    optional float vx = 13 [(dccl.field) = { min: -10 max: 10 precision: 1 }];
