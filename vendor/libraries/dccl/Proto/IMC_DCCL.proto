// PlanDB 
message PlanDB {
    option (dccl.msg) = { codec_version: 4 id: 556};

    enum TypeEnum
    {
        DBT_REQUEST = 0;
        DBT_SUCCESS = 1;
        DBT_FAILURE = 2;
        DBT_IN_PROGRESS = 3;
        DBT_UNKNOWN = 4;
    }

    enum OperationEnum
    {
        DBOP_SET = 0;
        DBOP_DEL = 1;
        DBOP_GET = 2;
        DBOP_GET_INFO = 3;
        DBOP_CLEAR = 4;
        DBOP_GET_STATE = 5;
        DBOP_GET_DSTATE = 6;
        DBOP_BOOT = 7;
        DBOP_UNKNOWN = 8;
    }
    
    TypeEnum type = 1;
    OperationEnum op = 2;
    optional uint32 request_id = 3 [(dccl.field) = { min: 0 max: 65535}];
    optional string plan_id = 4 [(dccl.field).max_length = 30]; 
